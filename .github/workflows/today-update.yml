name: Today Morning Summary Update

# 毎平日朝 7:00 JST = UTC 22:00 (日曜 22:00 〜 木曜 22:00)
# 日本時間 (UTC+9) の月-金朝 = UTC で日-木 22:00 に発火
# Phase C Day 2 では scaffold (実データ取得 + commit ロジックは Phase D-Day-Z で実装)
on:
  schedule:
    - cron: '0 22 * * 0-4'
  workflow_dispatch:
    inputs:
      target_date:
        description: '対象日 YYYY-MM-DD (省略時は当日 JST)'
        required: false
        type: string

jobs:
  update-today:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Resolve target date (default = today JST)
        id: target
        run: |
          if [ -n "${{ inputs.target_date }}" ]; then
            echo "date=${{ inputs.target_date }}" >> "$GITHUB_OUTPUT"
          else
            echo "date=$(TZ=Asia/Tokyo date +%Y-%m-%d)" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify morning-summary lib is buildable (Phase C Day 2 scaffold)
        run: pnpm test src/lib/morning-summary.test.ts

      # Phase C Day 2 では実データ取得 + commit は未実装 (scaffold のみ)。
      # Phase D-Day-Z (~ 2026-05-19) 以降で以下を有効化:
      #   1) scripts/generate-today.ts で catalog の前日値を fetch
      #   2) src/lib/morning-summary-data.ts に新規 date entry を append
      #   3) リン編集長が解説原稿を手動 / LLM 補助で追記
      #   4) git add + commit + push で main へ反映
      - name: Echo target date (scaffold notice)
        run: |
          echo "Phase C Day 2 scaffold: target_date=${{ steps.target.outputs.date }}"
          echo "Phase D-Day-Z で実データ取得 + auto-commit を実装予定"
